<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Registrace do klubu GECO</title>
<link rel="stylesheet" href="global.css">
</head>
<body>

<div class="club-container">
<div class="logo-header">
<a href="index.html"><img src="logo.png" alt="GECO" style="height: 60px;"></a>
</div>

<section class="hero-section">
<h1>Registrace do věrnostního klubu</h1>
<p>Vyplňte údaje a získejte výhody při nákupu.</p>

<form action="#" method="post" style="margin-top: 20px;">
<div style="margin-bottom: 15px;">
<label>Jméno a příjmení:</label><br>
<input type="text" name="jmeno" required style="width: 100%; padding: 8px;">
</div>
<div style="margin-bottom: 15px;">
<label>E-mail:</label><br>
<input type="email" name="email" required style="width: 100%; padding: 8px;">
</div>
<div style="margin-bottom: 15px;">
<label>Telefonní číslo:</label><br>
<input type="tel" name="telefon" style="width: 100%; padding: 8px;">
</div>
<button type="submit" style="background: #cc0000; color: #fff; border: none; padding: 10px 20px; cursor: pointer;">Odeslat registraci</button>
</form>
</section>
</div>

</body>
</html>
