<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>B2B Portál | SAP</title>
</head>
<body style="background: #0d0d0d; color: #fff; font-family: 'Helvetica', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;">

<div style="width: 100%; max-width: 400px; padding: 40px; border: 1px solid #cc0000; border-radius: 8px; background: #111;">
<h1 style="color: #cc0000; font-size: 1.8rem; text-align: center; margin-bottom: 10px;">B2B PORTÁL (SAP)</h1>
<p style="color: #aaa; text-align: center; margin-bottom: 30px; font-size: 0.9rem;">Vstup pro autorizované partnery.</p>

<form action="dashboard-partner.html" method="POST">
<input type="text" placeholder="Uživatelské jméno" required style="display: block; width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #333; background: #000; color: white; border-radius: 4px; box-sizing: border-box;">
<input type="password" placeholder="Heslo" required style="display: block; width: 100%; padding: 12px; margin-bottom: 25px; border: 1px solid #333; background: #000; color: white; border-radius: 4px; box-sizing: border-box;">

<button type="submit" style="width: 100%; padding: 15px; background: #cc0000; color: white; border: none; font-weight: bold; cursor: pointer; border-radius: 4px; transition: background 0.3s;">
PŘIHLÁSIT DO SAP
</button>
</form>

<div style="margin-top: 20px; text-align: center;">
<a href="index.html" style="color: #666; text-decoration: none; font-size: 0.8rem;">← Zpět na hlavní stránku</a>
</div>
</div>

</body>
</html>
