<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Pobočky GECO</title>
<script src="https://api.mapy.cz/loader.js"></script>
<script>Loader.load()</script>
</head>
<body>
<div id="mapa" style="width: 100%; height: 500px; border: 2px solid black;"></div>

<script>
// Inicializace pomocí SMap (spolehlivá metoda)
var center = SMap.Coords.fromWGS84(14.453, 50.181);
var mapa = new SMap(JAK.gel("mapa"), center, 7);
mapa.addDefaultLayer(SMap.DEF_BASE).enable();
mapa.addDefaultControls();
</script>
</body>
</html>
