<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Pobočky GECO</title>
<!-- Přímé vložení knihovny, bez Loaderu -->
<script src="https://api.mapy.cz/mapy-js/v2/js/mapy-js.js"></script>
</head>
<body>
<div id="mapa" style="width: 100%; height: 500px; border: 2px solid black;"></div>

<script>
// Tento kód se spustí až po načtení skriptu výše
window.onload = function() {
var stred = { lat: 49.81, lng: 15.47 };
var mapa = new SMap(JAK.gel("mapa"), stred, 7);
mapa.addDefaultLayer(SMap.DEF_BASE).enable();
mapa.addDefaultControls();
};
</script>
</body>
</html>
